<script>
(function(){
  function movePortfolioCards(){
    try {
      const gallery = document.querySelector('#gallery .grid');
      if(!gallery) return;
      const cards = Array.from(gallery.children);
      const first = cards.find(c => {
        const img = c.querySelector('img');
        return img && /Jack and Jill double bathroom sink with black faucets and marble trim/i.test(img.getAttribute('src')||'');
      });
      const second = cards.find(c => {
        const img = c.querySelector('img');
        return img && /Jack and Jill double bathroom sink with bronzed gold faucets/i.test(img.getAttribute('src')||'');
      });
      if(first) gallery.prepend(first);
      if(second) gallery.insertBefore(second, gallery.children[1] || null);
    } catch(e) {}
  }
  if(document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', movePortfolioCards);
  } else {
    movePortfolioCards();
  }
  // React may render after DOMContentLoaded, run a couple retries.
  setTimeout(movePortfolioCards, 400);
  setTimeout(movePortfolioCards, 1200);
})();
</script>


<script>
(function initBeforeAfterFix(){
  function setup(){
    const about=document.getElementById('about');
    if(!about) return false;
    const wraps=[...about.querySelectorAll('.cursor-ew-resize')];
    // choose largest interactive wrapper (not tiny handle)
    const wrapper=wraps.sort((a,b)=>b.getBoundingClientRect().width-a.getBoundingClientRect().width)[0];
    if(!wrapper || wrapper.dataset.baFixed==='1') return !!wrapper;
    const overlay=wrapper.querySelector('div[style*="clip-path"]');
    const divider=wrapper.querySelector('.absolute.top-0.bottom-0.w-1');
    const handle=divider && divider.querySelector('.absolute.top-1/2');
    if(!overlay || !divider) return false;
    wrapper.dataset.baFixed='1';
    let dragging=false;
    const setPos=(clientX)=>{
      const rect=wrapper.getBoundingClientRect();
      const x=Math.max(0,Math.min(rect.width, clientX-rect.left));
      const pct=(x/rect.width)*100;
      overlay.style.clipPath=`inset(0 ${100-pct}% 0 0)`;
      divider.style.left=pct+'%';
    };
    const start=(e)=>{dragging=true; const x=e.touches?e.touches[0].clientX:e.clientX; setPos(x); e.preventDefault&&e.preventDefault();};
    const move=(e)=>{if(!dragging) return; const x=e.touches?e.touches[0].clientX:e.clientX; setPos(x); e.preventDefault&&e.preventDefault();};
    const end=()=>{dragging=false;};
    wrapper.addEventListener('mousedown',start);
    window.addEventListener('mousemove',move,{passive:false});
    window.addEventListener('mouseup',end);
    wrapper.addEventListener('touchstart',start,{passive:false});
    window.addEventListener('touchmove',move,{passive:false});
    window.addEventListener('touchend',end);
    if(handle){handle.style.touchAction='none';}
    wrapper.style.touchAction='none';
    return true;
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', setup);
  setTimeout(setup,300); setTimeout(setup,1200); setTimeout(setup,2500);
})();
</script>


<script>
(function fixBeforeImage(){
  function run(){
    const imgs=[...document.querySelectorAll('img')];
    const before=imgs.find(i=>/before\s*-\s*old\s*kitchen\s*faucet/i.test(i.alt||''));
    if(!before) return false;
    const target='/images/Kitchen faucet in westminster before replacement single lever.jpg';
    // force exact source if anything changed/encoded badly
    if(!before.getAttribute('src') || !before.getAttribute('src').includes('before replacement single lever')){
      before.setAttribute('src', target);
    }
    before.style.display='block';
    before.style.visibility='visible';
    return true;
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', run);
  setTimeout(run,300); setTimeout(run,1000); setTimeout(run,2200);
})();
</script>


<script>
(function remapCenterNavLinks(){
  function run(){
    const navButtons=[...document.querySelectorAll('nav button')];
    if(!navButtons.length) return;
    navButtons.forEach(btn=>{
      const txt=(btn.textContent||'').trim().toLowerCase();
      if(txt==='services') btn.onclick=()=>{ window.location.href='/services.html'; };
      if(txt==='contact') btn.onclick=()=>{ window.location.href='/contact.html'; };
      if(txt==='gallery' || txt==='portfolio') btn.onclick=()=>{ window.location.href='/services.html'; };
      if(txt==='faq') btn.onclick=()=>{ window.location.href='/services.html#faq'; };
    });
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', run);
  setTimeout(run,400); setTimeout(run,1200);
})();
</script>


  <script>
    (function(){
      function addMobileMenu(){
        const nav=document.querySelector('nav');
        if(!nav || document.querySelector('.home-mobile-menu')) return;
        const menu=document.createElement('div');
        menu.className='home-mobile-menu';
        menu.innerHTML='<button class="home-mobile-menu-btn" type="button" aria-label="Open menu">▾</button><div class="home-mobile-menu-list"><a href="/services.html">Services</a><a href="/contact.html">Contact</a></div>';
        const btn=menu.querySelector('.home-mobile-menu-btn');
        btn.addEventListener('click',()=>menu.classList.toggle('open'));
        document.addEventListener('click',(e)=>{ if(!menu.contains(e.target)) menu.classList.remove('open'); });
        nav.parentElement.appendChild(menu);
      }
      if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', addMobileMenu);
      setTimeout(addMobileMenu,300); setTimeout(addMobileMenu,1000); setTimeout(addMobileMenu,2200);
    })();
  </script>
