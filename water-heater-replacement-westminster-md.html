      <h2>Types of Water Heaters We Install</h2>
      <div class="grid">
        <div class="mini">
          <h3 style="margin-top:0;color:var(--blue)">Tank Water Heaters</h3>
          <p>Traditional storage water heaters (30-80 gallon capacity). Reliable, lower upfront cost, and work with gas or electric. Best for steady hot water demand and budget-conscious replacements.</p>
          <p><strong>Lifespan:</strong> 8-12 years with proper maintenance.</p>
        </div>
        <div class="mini">
          <h3 style="margin-top:0;color:var(--blue)">Tankless Water Heaters</h3>
          <p>On-demand, unlimited hot water. Heats water as it flows through the unit, so no storage tank. Great for energy savings and homes that want endless hot showers.</p>
          <p><strong>Lifespan:</strong> 20+ years. Upfront cost higher, but energy savings 24-34%.</p>
        </div>
        <div class="mini">
          <h3 style="margin-top:0;color:var(--blue)">Heat Pump Water Heaters</h3>
          <p>Extremely efficient – use electricity to move heat from air to water instead of generating it directly. 2-3x more efficient than standard electric. Best for garages, basements, warm climates.</p>
          <p><strong>Lifespan:</strong> 10-15 years. Highest upfront cost, lowest operating cost.</p>
        </div>
      </div>

      <h2>Energy Efficiency & Savings</h2>
      <p>Modern water heaters are significantly more efficient than units from 10+ years ago. Upgrading can reduce water heating costs by 20-50%.</p>
      <ul>
        <li><strong>Tank heaters:</strong> Higher EF ratings, better insulation, sealed combustion options.</li>
        <li><strong>Tankless:</strong> No standby heat loss, only heats when needed. 24-34% energy savings on average.</li>
        <li><strong>Heat pumps:</strong> 300-400% efficiency (vs 90% for electric). Huge long-term savings, especially in moderate climates.</li>
      </ul>
      <p><strong>Rebates available:</strong> Many utilities offer incentives for high-efficiency water heaters (especially heat pumps and tankless). We help you identify and apply for rebates to lower your cost.</p>
    </section>

    <section class="section">
      <h2>Frequently Asked Questions</h2>
      <div class="faq-item">
        <div class="faq-question">How long does a water heater typically last in Westminster MD?</div>
        <div class="faq-answer">Tank water heaters last 8-12 years; tankless 20+ years; heat pumps 10-15 years. Hard water and lack of maintenance shorten lifespan. Our maintenance plans maximize your system's life.</div>
      </div>
      <div class="faq-item">
        <div class="faq-question">How do I know what size water heater I need?</div>
        <div class="faq-answer">For tank heaters, consider First Hour Rating (FHR) based on family size and peak usage. 2-person home: 40-50 gallon; 3-4 person: 50-80 gallon; 5+: 80 gallon or tankless. For tankless, calculate flow rate (GPM) needed during peak use. We provide free load calculations.</div>
      </div>
      <div class="faq-item">
        <div class="faq-question">How much does water heater installation cost?</div>
        <div class="faq-answer">Tank: $800-2,200 installed; Tankless: $1,500-3,500; Heat pump: $1,800-3,000. Factors: unit size, fuel type, venting, electrical/gas upgrades, permits. We give free, itemized quotes.</div>
      </div>
      <div class="faq-item">
        <div class="faq-question">Should I repair or replace my water heater?</div>
        <div class="faq-answer">Consider replacement if: unit over 10 years old, repair cost >50% of new unit cost, repeated failures, tank leaking, or efficiency gains justify investment. We provide honest cost-benefit analysis.</div>
      </div>
      <div class="faq-item">
        <div class="faq-question">Are tankless water heaters worth the extra cost?</div>
        <div class="faq-answer">Yes if you want unlimited hot water, have high energy bills, plan to stay long-term, and want 20+ year lifespan. Tankless cost 2-3x more upfront but save 24-34% annually and last twice as long. The convenience of endless hot water is a major benefit for larger families.</div>
      </div>
      <div class="faq-item">
        <div class="faq-question">How often should I have my water heater serviced?</div>
        <div class="faq-answer">Annual maintenance recommended for all types. Tank: flush annually, inspect anode rod every 2-3 years, test T&P valve. Tankless: annual descaling (especially with hard water), filter cleaning, burner inspection. Heat pump: clean air filters quarterly, check refrigerant, clean condenser coils.</div>
      </div>
      <div class="faq-item">
        <div class="faq-question">Can I install a water heater myself?</div>
        <div class="faq-answer">DIY not recommended. Maryland requires permits for water heater installation. Improper work can cause leaks, gas hazards, carbon monoxide, or void warranties. Professional installation ensures code compliance, safe venting, proper electrical/gas connections, and warranty protection.</div>
      </div>
    </section>
